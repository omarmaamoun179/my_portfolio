<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Omar Osama Maamoun — Mid-Level Flutter Developer. 10+ cross-platform apps shipped, 5,000+ users, 99% crash-free.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Omar Maamoun">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Omar Maamoun — Flutter Developer</title>

  <!-- Google Analytics (GA4) — gtag.js. The privacy policy page describes
       what this collects: /privacy -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BKK8MB3JV0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    // anonymize_ip + manual page_view: the Flutter SPA never reloads, so we
    // emit page_view events from Dart on route changes instead of on load.
    gtag('config', 'G-BKK8MB3JV0', {
      anonymize_ip: true,
      send_page_view: false
    });
  </script>

  <style>
    /* Loading splash matching the dark terminal aesthetic */
    body { background-color: #0a0e14; margin: 0; }
  </style>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
